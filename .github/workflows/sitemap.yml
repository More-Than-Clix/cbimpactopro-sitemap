name: Generar y enviar sitemap de propiedades

on:
  # Ejecutar automáticamente cada lunes, miércoles y viernes a las 6am UTC (3am Argentina)
  schedule:
    - cron: "0 6 * * 1,3,5"

  # Permitir ejecución manual desde la interfaz de GitHub
  workflow_dispatch:

jobs:
  generate-sitemap:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write   # Necesario para hacer commit del sitemap generado

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install playwright google-auth google-auth-httplib2 google-api-python-client
          playwright install chromium
          playwright install-deps chromium

      - name: Generar sitemap
        run: python generate_sitemap.py

      - name: Verificar que el sitemap fue generado
        run: |
          if [ ! -f sitemap_properties.xml ]; then
            echo "❌ El sitemap no fue generado. Abortando."
            exit 1
          fi
          echo "✅ Sitemap generado correctamente."
          echo "URLs encontradas: $(grep -c '<loc>' sitemap_properties.xml)"

      - name: Guardar sitemap en el repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap_properties.xml
          git diff --staged --quiet || git commit -m "🗺️ Sitemap actualizado - $(date '+%Y-%m-%d')"
          git push

      - name: Notificar buscadores
        run: python submit_sitemap.py
